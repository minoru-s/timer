<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptitude Minimal Timer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon/icon-192.png">
  <meta name="theme-color" content="#1e3a8a">
  <style>
    :root {
      --body-bg: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
      --glass-bg: rgba(255, 255, 255, 0.45);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: rgba(0, 0, 0, 0.1);
      --text-color: #334155;
      --track-bg: rgba(255, 255, 255, 0.6);
      --btn-bg: rgba(255, 255, 255, 0.4);
      --btn-text-color: #1e293b;
      --btn-hover-bg: rgba(255, 255, 255, 0.7);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--body-bg);
      color: var(--text-color);
      padding: 20px;
      overflow-x: hidden;
    }

    .glass-container {
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px 0 var(--glass-shadow);
      border-radius: 30px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      text-align: center;
      background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 50%, rgba(255, 255, 255, 0.05) 100%);
    }

    .title {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 15px;
      color: #1e3a8a;
      text-shadow: 0 1px 4px rgba(255, 255, 255, 0.5);
    }

    .status-text {
      font-size: 1.15rem;
      font-weight: 400;
      min-height: 48px;
      margin-bottom: 5px;
      line-height: 1.5;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
    }

    .state-desc {
      font-size: 1rem;
      font-weight: bold;
      color: #475569;
      min-height: 24px;
      margin-bottom: 20px;
    }

    .timer-visual {
      position: relative;
      width: 100%;
      height: 95px;
      margin: 20px 0 30px;
      border-radius: 20px;
      background: var(--track-bg);
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .btn-group {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      background: var(--btn-bg);
      border: 1px solid var(--glass-border);
      color: var(--btn-text-color);
      padding: 14px 8px;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    button:hover {
      background: var(--btn-hover-bg);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    button:active {
      transform: translateY(0);
    }

    .reset-btn {
      grid-column: span 2;
      background: rgba(255, 150, 150, 0.2);
      border-color: rgba(255, 150, 150, 0.4);
      color: #b91c1c;
    }

    .reset-btn:hover {
      background: rgba(255, 150, 150, 0.4);
    }

    .action-btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .primary-btn {
      background: rgba(255, 255, 255, 0.6);
      color: #1e3a8a;
      font-size: 1.25rem;
      padding: 18px;
      border-radius: 16px;
    }

    .primary-btn:hover {
      background: rgba(255, 255, 255, 0.8);
    }

    .secondary-btn {
      background: rgba(34, 197, 94, 0.2);
      border-color: rgba(34, 197, 94, 0.3);
      color: #166534;
      padding: 14px;
    }

    .secondary-btn:hover {
      background: rgba(34, 197, 94, 0.35);
    }

    .danger-btn {
      background: rgba(15, 23, 42, 0.1);
      border-color: rgba(15, 23, 42, 0.2);
      color: #1e293b;
      padding: 14px;
    }

    .danger-btn:hover {
      background: rgba(15, 23, 42, 0.15);
    }

    @media (max-width: 600px) {
      .glass-container {
        padding: 30px;
      }

      .btn-group {
        grid-template-columns: repeat(3, 1fr);
      }

      .reset-btn {
        grid-column: span 3;
      }
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      width: 90%;
      max-width: 450px;
      padding: 35px;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.show .modal-content {
      transform: translateY(0);
    }

    .modal-content h2 {
      margin-bottom: 25px;
      color: #1e3a8a;
      font-size: 1.6rem;
    }

    .pie-chart {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      margin: 0 auto 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: background 0.5s ease;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      text-align: left;
      margin-bottom: 25px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.6);
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
    }

    .stat-box.full-width {
      grid-column: span 2;
      text-align: center;
      background: rgba(255, 255, 255, 0.8);
    }

    .stat-label {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: bold;
      color: #1e293b;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 4px;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 4px;
    }

    .close-btn {
      width: 100%;
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 1.1rem;
      text-shadow: none;
    }

    .close-btn:hover {
      background: #1e40af;
      transform: translateY(-2px);
    }

    .stats-view-btn {
      margin-top: 15px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #475569;
      font-size: 0.95rem;
      padding: 10px 20px;
      border-radius: 20px;
      box-shadow: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .stats-view-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      color: #1e3a8a;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>

<body>

  <div class="glass-container">
    <h1 class="title">Focus Timer</h1>
    <div class="status-text" id="statusText">時間を選択してスタート</div>
    <div class="state-desc" id="stateDesc"></div>

    <div class="timer-visual" id="canvasContainer">
      <canvas id="timerCanvas"></canvas>
    </div>

    <div class="btn-group">
      <button onclick="startTimer(10)">10秒</button>
      <button onclick="startTimer(30)">30秒</button>
      <button onclick="startTimer(45)">45秒</button>
      <button onclick="startTimer(60)">60秒</button>
      <button onclick="startTimer(90)">90秒</button>
      <button onclick="startTimer(120)">120秒</button>
      <button class="reset-btn" onclick="resetTimer()">リセット(記録なし)</button>
    </div>

    <div class="action-btn-group" id="actionBtnGroup">
      <button id="doneBtn" class="primary-btn" style="display: none;" onclick="finishSolving()">完了 / タイム記録</button>
      <button id="breakBtn" class="secondary-btn" style="display: none;" onclick="startBreak()">休憩する</button>
      <button id="endBtn" class="danger-btn" style="display: none;" onclick="endSession()">今日の勉強タイム終了</button>
    </div>

    <button class="stats-view-btn" onclick="showModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      学習記録を見る
    </button>
  </div>

  <!-- Result Modal -->
  <div id="resultModal" class="modal-overlay">
    <div class="modal-content glass-container">
      <h2>お疲れ様でした！</h2>
      <div class="pie-chart" id="pieChart"></div>

      <div class="stats-grid">
        <div class="stat-box full-width">
          <div class="stat-label">今日の勉強時間 (解答＋解説)</div>
          <div class="stat-value" id="modalTotalStudy" style="font-size: 1.6rem; color: #1e3a8a;">0秒</div>
        </div>
        <div class="stat-box">
          <div class="legend">
            <div class="legend-color" style="background:#3b82f6;"></div>解答
          </div>
          <div class="stat-value" id="modalSolving">0秒</div>
        </div>
        <div class="stat-box">
          <div class="legend">
            <div class="legend-color" style="background:#22c55e;"></div>解説
          </div>
          <div class="stat-value" id="modalExplanation">0秒</div>
        </div>
        <div class="stat-box">
          <div class="legend">
            <div class="legend-color" style="background:#f97316;"></div>休憩
          </div>
          <div class="stat-value" id="modalBreak">0秒</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">累計学習時間</div>
          <div class="stat-value" id="modalCumulative">0秒</div>
        </div>
      </div>

      <button class="close-btn" onclick="closeModal()">閉じる</button>
    </div>
  </div>

  <script>
    // --- Canvas設定と初期化 ---
    const canvas = document.getElementById('timerCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvasContainer');
    let canvasWidth, canvasHeight;

    function resizeCanvas() {
      const rect = container.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvasWidth = rect.width;
      canvasHeight = rect.height;

      ctx.scale(dpr, dpr);
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `${rect.height}px`;

      drawCanvas();
    }
    window.addEventListener('resize', resizeCanvas);

    // --- Wake Lock API ---
    let wakeLock = null;
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch (err) {
          console.warn(`Wake Lock error: ${err.name}, ${err.message}`);
        }
      }
    }
    function releaseWakeLock() {
      if (wakeLock !== null) {
        wakeLock.release().then(() => { wakeLock = null; });
      }
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && currentState !== 'IDLE') {
        requestWakeLock();
      }
    });

    // --- State Machine & Persistence ---
    let currentState = 'IDLE'; // 'IDLE', 'SOLVING', 'EXPLANATION', 'BREAK'
    let stateStartTime = 0;

    let stats = {
      lastDate: '',
      todaySolvingMs: 0,
      todayExplanationMs: 0,
      todayBreakMs: 0,
      cumulativeStudyMs: 0
    };

    function loadStats() {
      const saved = localStorage.getItem('studyTimerStats');
      if (saved) {
        try {
          stats = { ...stats, ...JSON.parse(saved) };
        } catch (e) { }
      }

      // 日替わり判定
      const today = new Date().toLocaleDateString();
      if (stats.lastDate !== today) {
        stats.lastDate = today;
        stats.todaySolvingMs = 0;
        stats.todayExplanationMs = 0;
        stats.todayBreakMs = 0;
        saveStats();
      }
      setUIForState('IDLE');
    }

    function saveStats() {
      localStorage.setItem('studyTimerStats', JSON.stringify(stats));
    }

    function commitCurrentStateTime() {
      if (currentState === 'IDLE' || stateStartTime === 0) return;

      // 日替わりチェック (深夜に跨いだ場合も、とりあえずコミット時に今日に加算される。細かい要件は午前0時リセット)
      const today = new Date().toLocaleDateString();
      if (stats.lastDate !== today) {
        stats.lastDate = today;
        stats.todaySolvingMs = 0;
        stats.todayExplanationMs = 0;
        stats.todayBreakMs = 0;
      }

      const elapsed = performance.now() - stateStartTime;

      if (currentState === 'SOLVING') {
        stats.todaySolvingMs += elapsed;
        stats.cumulativeStudyMs += elapsed;
      } else if (currentState === 'EXPLANATION') {
        stats.todayExplanationMs += elapsed;
        stats.cumulativeStudyMs += elapsed;
      } else if (currentState === 'BREAK') {
        stats.todayBreakMs += elapsed;
      }
      
      stateStartTime = performance.now();
      saveStats();
    }

    // ページを閉じる際にも時間を記録
    window.addEventListener('beforeunload', () => {
      commitCurrentStateTime();
    });

    // --- Timer Logic ---
    const PIXELS_PER_SEC = 15;
    let animationFrameId;
    let targetSeconds = 0;
    let elapsedMs = 0;

    const statusText = document.getElementById('statusText');
    const stateDesc = document.getElementById('stateDesc');
    const planePath = new Path2D('M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z');

    function setUIForState(state) {
      const doneBtn = document.getElementById('doneBtn');
      const breakBtn = document.getElementById('breakBtn');
      const endBtn = document.getElementById('endBtn');

      doneBtn.style.display = (state === 'SOLVING') ? 'block' : 'none';
      breakBtn.style.display = (state === 'EXPLANATION') ? 'block' : 'none';

      // End button is shown if not IDLE, OR if we have some study time today.
      const hasStudiedToday = (stats.todaySolvingMs > 0 || stats.todayExplanationMs > 0);
      endBtn.style.display = (state !== 'IDLE' || hasStudiedToday) ? 'block' : 'none';
    }

    function drawPulse(x, y, colorPrefix, duration, maxRadius) {
      const pulseTime = (performance.now() - stateStartTime) % duration;
      const pulseProgress = pulseTime / duration;
      const currentRadius = maxRadius * pulseProgress;
      const opacity = 1 - Math.pow(pulseProgress, 1.5);
      ctx.beginPath();
      ctx.arc(x, y, currentRadius, 0, Math.PI * 2);
      ctx.fillStyle = `${colorPrefix} ${opacity * 0.5})`;
      ctx.fill();
    }

    function drawCanvas() {
      ctx.clearRect(0, 0, canvasWidth, canvasHeight);
      const centerX = canvasWidth / 2;
      const centerY = canvasHeight / 2;

      if (currentState === 'SOLVING' && targetSeconds > 0) {
        const currentX = (elapsedMs / 1000) * PIXELS_PER_SEC;

        // Track
        ctx.save();
        ctx.translate(centerX - currentX, centerY);
        const currentSecs = elapsedMs / 1000;
        const drawUntilSecs = Math.max(targetSeconds, currentSecs) + 30;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(drawUntilSecs * PIXELS_PER_SEC, 0);
        ctx.strokeStyle = 'rgba(0, 100, 200, 0.25)';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.stroke();

        for (let s = 0; s <= drawUntilSecs; s += 15) {
          const x = s * PIXELS_PER_SEC;
          ctx.beginPath();
          ctx.moveTo(x, -20);
          ctx.lineTo(x, 20);
          ctx.strokeStyle = 'rgba(0, 100, 200, 0.15)';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.moveTo(targetSeconds * PIXELS_PER_SEC, -25);
        ctx.lineTo(targetSeconds * PIXELS_PER_SEC, 25);
        ctx.strokeStyle = 'rgba(37, 99, 235, 0.4)';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();

        // Pulse
        drawPulse(centerX, centerY, 'rgba(37, 99, 235,', 2500, 35);

        // Plane
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(Math.PI / 2);
        ctx.shadowColor = 'rgba(37, 99, 235, 0.6)';
        ctx.shadowBlur = 15;
        const scale = 1.3;
        ctx.scale(scale, scale);
        ctx.translate(-12, -12);
        ctx.fillStyle = '#2563eb';
        ctx.fill(planePath);
        ctx.restore();

      } else if (currentState === 'EXPLANATION') {
        drawPulse(centerX, centerY, 'rgba(34, 197, 94,', 3000, 45); // Green pulse
      } else if (currentState === 'BREAK') {
        drawPulse(centerX, centerY, 'rgba(249, 115, 22,', 4000, 50); // Orange pulse
      }
    }

    function updateTimer(currentTime) {
      if (currentState === 'IDLE') return;

      elapsedMs = currentTime - stateStartTime;
      const secs = Math.floor(elapsedMs / 1000);
      const mins = Math.floor(secs / 60);
      const displaySecs = secs % 60;
      const timeStr = mins > 0 ? `${mins}分${displaySecs}秒` : `${secs}秒`;

      if (currentState === 'SOLVING') {
        stateDesc.textContent = `問題を解いています...`;
      } else if (currentState === 'EXPLANATION') {
        stateDesc.textContent = `解説を読んでいます... (${timeStr} 経過)`;
      } else if (currentState === 'BREAK') {
        stateDesc.textContent = `休憩中... (${timeStr} 経過)`;
      }

      drawCanvas();
      animationFrameId = requestAnimationFrame(updateTimer);
    }

    // --- User Actions ---
    function startTimer(seconds) {
      commitCurrentStateTime(); // Save previous state if any

      currentState = 'SOLVING';
      stateStartTime = performance.now();
      targetSeconds = seconds;
      elapsedMs = 0;

      setUIForState(currentState);
      statusText.textContent = `目標: ${seconds}秒`;
      stateDesc.textContent = '';

      requestWakeLock();
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      animationFrameId = requestAnimationFrame(updateTimer);
    }

    function finishSolving() {
      if (currentState !== 'SOLVING') return;
      commitCurrentStateTime();

      const finalElapsedSec = (elapsedMs / 1000).toFixed(1);
      const diffSec = (finalElapsedSec - targetSeconds).toFixed(1);
      const ratioPercent = targetSeconds > 0 ? ((finalElapsedSec / targetSeconds - 1) * 100).toFixed(1) : 0;

      let resultText = `クリア！ 解答時間: ${finalElapsedSec}秒<br>`;
      resultText += `<span style="font-size:0.95rem; margin-top: 4px; display: block;">規定タイム (${targetSeconds}秒) から: `;
      if (diffSec < 0) {
        resultText += `<span style="color: #166534; font-weight: bold;">${Math.abs(diffSec)}秒速い</span>`;
      } else if (diffSec > 0) {
        resultText += `<span style="color: #b91c1c; font-weight: bold;">${diffSec}秒遅い</span>`;
      } else {
        resultText += `<span style="font-weight: bold;">ぴったり</span>`;
      }
      resultText += `</span>`;

      statusText.innerHTML = resultText;

      currentState = 'EXPLANATION';
      stateStartTime = performance.now();
      elapsedMs = 0;
      setUIForState(currentState);
    }

    function startBreak() {
      if (currentState !== 'EXPLANATION' && currentState !== 'SOLVING') return;
      commitCurrentStateTime();

      statusText.textContent = 'リフレッシュしましょう！';

      currentState = 'BREAK';
      stateStartTime = performance.now();
      elapsedMs = 0;
      setUIForState(currentState);
    }

    function resetTimer() {
      // Don't commit time (abort)
      currentState = 'IDLE';
      stateStartTime = 0;
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      releaseWakeLock();
      setUIForState('IDLE');
      statusText.textContent = '時間を選択してスタート';
      stateDesc.textContent = '';
      drawCanvas();
    }

    function endSession() {
      commitCurrentStateTime();
      currentState = 'IDLE';
      stateStartTime = 0;
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      releaseWakeLock();
      setUIForState('IDLE');
      statusText.textContent = '時間を選択してスタート';
      stateDesc.textContent = '';
      drawCanvas();

      showModal();
    }

    // --- Modal Logic ---
    function formatMs(ms) {
      const totalSecs = Math.floor(ms / 1000);
      const h = Math.floor(totalSecs / 3600);
      const m = Math.floor((totalSecs % 3600) / 60);
      const s = totalSecs % 60;
      if (h > 0) return `${h}時間${m}分${s}秒`;
      if (m > 0) return `${m}分${s}秒`;
      return `${s}秒`;
    }

    function showModal() {
      commitCurrentStateTime();
      
      const sMs = stats.todaySolvingMs;
      const eMs = stats.todayExplanationMs;
      const bMs = stats.todayBreakMs;
      const totalStudyMs = sMs + eMs;
      const totalAllMs = totalStudyMs + bMs;

      document.getElementById('modalTotalStudy').textContent = formatMs(totalStudyMs);
      document.getElementById('modalCumulative').textContent = formatMs(stats.cumulativeStudyMs);

      document.getElementById('modalSolving').textContent = formatMs(sMs);
      document.getElementById('modalExplanation').textContent = formatMs(eMs);
      document.getElementById('modalBreak').textContent = formatMs(bMs);

      const pieChart = document.getElementById('pieChart');
      if (totalAllMs === 0) {
        pieChart.style.background = '#e2e8f0';
      } else {
        const sPct = (sMs / totalAllMs) * 100;
        const ePct = (eMs / totalAllMs) * 100;
        const bPct = (bMs / totalAllMs) * 100;

        pieChart.style.background = `conic-gradient(
          #3b82f6 0% ${sPct}%,
          #22c55e ${sPct}% ${sPct + ePct}%,
          #f97316 ${sPct + ePct}% 100%
        )`;
      }

      const modal = document.getElementById('resultModal');
      modal.classList.add('show');
    }

    function closeModal() {
      document.getElementById('resultModal').classList.remove('show');
    }

    // --- Init ---
    window.onload = () => {
      loadStats();
      resizeCanvas();
    };

    // --- Service Worker ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.error);
      });
    }

  </script>
</body>

</html>
